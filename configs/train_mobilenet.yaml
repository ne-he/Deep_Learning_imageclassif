# MobileNetV2 transfer-learning config. Extends base.yaml.
defaults: "base.yaml"

model:
  architecture: "mobilenet_v2"
  pretrained: true
  freeze_backbone: true

training:
  epochs: 20
  learning_rate: 0.001

# CPU fallback: train.py reads cpu_batch_size when no GPU is detected.
cpu_batch_size: 16
